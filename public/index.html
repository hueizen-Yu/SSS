<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>購物需求系統</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- Login Page -->
    <div id="login-page" class="page active container">
        <div class="glass-card">
            <h1>系統登入</h1>
            <p class="subtitle">請輸入您的帳號與密碼</p>
            <form id="login-form">
                <div class="input-group">
                    <label for="login-username">使用者名稱</label>
                    <input type="text" id="login-username" required placeholder="輸入帳號">
                </div>
                <div class="input-group">
                    <label for="login-password">密碼</label>
                    <input type="password" id="login-password" required placeholder="輸入密碼">
                </div>
                <button type="submit" class="btn-primary">登入</button>
            </form>
            <div style="text-align: center; margin-top: 15px;">
                <a href="#" id="go-to-register" style="color: var(--primary); text-decoration: none; font-size: 14px;">還沒有帳號？點此註冊</a>
            </div>
        </div>
    </div>

    <!-- Register Page -->
    <div id="register-page" class="page container">
        <div class="glass-card">
            <h1>註冊帳號</h1>
            <p class="subtitle">建立您的專屬購物需求帳號</p>
            <form id="register-form">
                <div class="input-group">
                    <label for="reg-username">使用者名稱</label>
                    <input type="text" id="reg-username" required placeholder="設定帳號名稱">
                </div>
                <div class="input-group">
                    <label for="reg-password">密碼設定</label>
                    <input type="password" id="reg-password" required placeholder="設定登入密碼">
                </div>
                <div class="input-group">
                    <label for="reg-gender">性別</label>
                    <select id="reg-gender" required style="width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.5); background: rgba(255,255,255,0.5); outline: none; font-size: 16px; font-family: inherit;">
                        <option value="男">男</option>
                        <option value="女">女</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">註冊</button>
            </form>
            <div style="text-align: center; margin-top: 15px;">
                <a href="#" id="go-to-login" style="color: var(--text-muted); text-decoration: none; font-size: 14px;">已經有帳號？返回登入</a>
            </div>
        </div>
    </div>

    <!-- Input Form Page -->
    <div id="form-page" class="page container">
        <div class="glass-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span id="user-display" style="font-size: 14px; color: var(--primary); font-weight: 600;"></span>
                    <button id="admin-manage-btn" class="btn-small admin-only" style="display: none; background: var(--secondary);">管理系統</button>
                </div>
                <button id="logout-btn-form" class="btn-small" style="width: auto; padding: 4px 10px; background: #ef4444;">登出</button>
            </div>
            <h1 id="form-title" class="editable-title">購物需求申請</h1>
            <p class="subtitle">請勾選您需要的品項 (每頁 3 項)</p>
            
            <form id="health-form">
                <div id="product-container" class="checkbox-group" style="display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; min-height: 400px;">
                    <!-- Products will be injected here -->
                </div>
                
                <!-- Pagination -->
                <div id="pagination-controls" style="display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 20px;">
                    <button type="button" id="prev-page" class="btn-small" style="width: auto; padding: 5px 15px;">上一頁</button>
                    <span id="page-info" style="font-size: 14px; color: var(--text-muted);">第 1 / 1 頁</span>
                    <button type="button" id="next-page" class="btn-small" style="width: auto; padding: 5px 15px;">下一頁</button>
                </div>

                <button type="submit" class="btn-primary">送出需求清單</button>
            </form>
            <button id="view-records-btn" class="btn-secondary mt-3">直接查看歷史記錄</button>
        </div>
    </div>

    <!-- Product Management Page -->
    <div id="manage-page" class="page container">
        <div class="glass-card large">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1>品項管理系統</h1>
                <button id="back-to-form-from-manage" class="btn-small" style="width: auto;">返回選購</button>
            </div>
            <button id="add-product-btn" class="btn-primary" style="margin-bottom: 20px;">+ 新增產品品項</button>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>編號</th>
                            <th>名稱</th>
                            <th>簡短描述</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="manage-products-body">
                        <!-- Products for management will be injected here -->
                    </tbody>
                </table>
            </div>

            <div style="margin-top: 40px; border-top: 1px solid var(--glass-border); padding-top: 20px;">
                <h2>網站全局設定</h2>
                <div class="input-group" style="margin-top: 15px;">
                    <label for="set-form-title">首頁標題名稱</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="set-form-title" placeholder="修改首頁大標題">
                        <button id="save-settings-btn" class="btn-small" style="width: 100px;">儲存</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Product Detail Page -->
    <div id="detail-page" class="page container">
        <div class="glass-card">
            <button id="back-to-form-btn" class="btn-small mb-4" style="background: rgba(255,255,255,0.1); color: #fff; width: auto;">← 返回選購頁面</button>
            <div style="display: flex; flex-direction: column; gap: 20px;">
                <div style="width: 100%; height: 300px; border-radius: 20px; overflow: hidden; background: #000; border: 1px solid var(--glass-border);">
                    <img id="detail-image" src="" alt="Product Image" style="width: 100%; height: 100%; object-fit: contain;">
                </div>
                <div>
                    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 10px;">
                        <span id="detail-id" class="product-id"></span>
                        <h2 id="detail-name" style="margin: 0; color: #fff; font-size: 2rem;"></h2>
                        <span id="detail-price" style="margin-left: auto; color: var(--primary); font-size: 1.5rem; font-weight: 600;"></span>
                    </div>
                    <div style="padding: 20px; background: rgba(255,255,255,0.03); border-radius: 16px; border: 1px solid var(--glass-border);">
                        <h3 style="color: var(--primary); font-size: 0.9rem; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 0.1em;">產品詳細介紹</h3>
                        <p id="detail-description" style="line-height: 1.8; color: #cbd5e1; font-size: 1.1rem;"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Records List Page -->
    <div id="list-page" class="page container">
        <div class="glass-card large">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <span id="user-display-list" style="font-size: 14px; color: var(--primary); font-weight: 600;"></span>
                <button id="logout-btn-list" class="btn-small" style="width: auto; padding: 4px 10px; background: #ef4444;">登出</button>
            </div>
            <h1>購物清單</h1>
            <div style="display: flex; gap: 10px; margin-bottom: 24px;">
                <button id="back-btn" class="btn-secondary" style="margin-bottom: 0;">返回首頁</button>
                <button id="export-excel-btn" class="btn-primary" style="margin-bottom: 0; background-color: #10b981;">下載 Excel</button>
            </div>
            
            <div class="table-container">
                <table id="records-table">
                    <thead>
                        <tr>
                            <th>申請時間</th>
                            <th>申請人</th>
                            <th>品名</th>
                            <th>編號(數量)</th>
                            <th>單價</th>
                            <th>總價</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="records-body">
                        <!-- Records will be injected here -->
                    </tbody>
                </table>
                <div id="loading-indicator" class="loading hidden">載入中...</div>
                <div id="empty-state" class="empty-state hidden">目前還沒有任何紀錄喔！</div>
            </div>
        </div>
    </div>

    <!-- Admin Product Edit/Add Modal -->
    <div id="product-modal" class="modal hidden">
        <div class="glass-card">
            <h2 id="product-modal-title">新增產品資訊</h2>
            <form id="product-form">
                <input type="hidden" id="product-db-id">
                <div class="input-group">
                    <label for="prod-id">產品編號</label>
                    <input type="text" id="prod-id" required placeholder="例如: 004">
                </div>
                <div class="input-group">
                    <label for="prod-name">產品名稱</label>
                    <input type="text" id="prod-name" required placeholder="產品名稱">
                </div>
                <div class="input-group">
                    <label for="prod-price">產品售價 (NT$)</label>
                    <input type="number" id="prod-price" required placeholder="例如: 1500" min="0">
                </div>
                <div class="input-group">
                    <label for="prod-short-desc">卡片簡短描述</label>
                    <textarea id="prod-short-desc" required style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.5); background: rgba(255,255,255,0.5); min-height: 60px; font-family: inherit; color: #fff;"></textarea>
                </div>
                <div class="input-group">
                    <label for="prod-long-desc">產品詳細介紹</label>
                    <textarea id="prod-long-desc" required style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.5); background: rgba(255,255,255,0.5); min-height: 100px; font-family: inherit; color: #fff;"></textarea>
                </div>
                <div class="input-group">
                    <label for="prod-image">產品圖片</label>
                    <input type="file" id="prod-image" accept="image/*" style="width: 100%; padding: 10px; background: rgba(255,255,255,0.1); border-radius: 10px; border: 1px solid rgba(255,255,255,0.3); color: #fff;">
                </div>
                <button type="submit" class="btn-primary">儲存產品</button>
                <button type="button" id="cancel-product-btn" class="btn-secondary mt-3">取消</button>
            </form>
        </div>
    </div>

    <!-- Admin Edit Record Modal -->
    <div id="edit-modal" class="modal hidden">
        <div class="glass-card">
            <h2>編輯申請需求</h2>
            <form id="edit-form">
                <input type="hidden" id="edit-id">
                <div id="edit-items-container" class="checkbox-group" style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; max-height: 300px; overflow-y: auto;">
                    <!-- Dynamic items for edit will be here -->
                </div>
                <div class="input-group">
                    <label for="edit-description">需求備註 (僅限管理者)</label>
                    <textarea id="edit-description" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.5); background: rgba(255,255,255,0.5); min-height: 80px; font-family: inherit; color: #fff;"></textarea>
                </div>
                <button type="submit" class="btn-primary">儲存變更</button>
                <button type="button" id="cancel-edit-btn" class="btn-secondary mt-3">取消</button>
            </form>
        </div>
    </div>

    <script src="script.js?v=20260425_1114"></script>
</body>
</html>
